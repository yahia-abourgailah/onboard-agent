# Local development services.
# Qdrant backs the onboarding knowledge base (see vectorstore/creation.py).
# The app reads its address from QDRANT_URL (default http://localhost:6333).
services:
  qdrant:
    image: qdrant/qdrant:latest # pin to a specific version before production
    container_name: onboard-agent-qdrant
    ports:
      - "6333:6333" # REST / HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
